name: 🚀 Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔑 Create config.json with secrets
        run: |
          cat > config-deploy.json << 'ENDFILE'
          {
            "emailjs": {
              "publicKey": "${{ secrets.EMAILJS_PUBLIC_KEY }}",
              "serviceId": "${{ secrets.EMAILJS_SERVICE_ID }}",
              "templateId": "${{ secrets.EMAILJS_TEMPLATE_ID }}"
            },
            "recaptcha": {
              "siteKey": "${{ secrets.RECAPTCHA_SITE_KEY }}"
            },
            "analytics": {
              "id": "${{ secrets.GA_ID }}"
            }
          }
          ENDFILE
      
      - name: 🔐 Setup Pages
        uses: actions/configure-pages@v4
      
      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
